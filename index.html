<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Empreendimentos </title>
    <!--LINK CSS-->
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/resete.css" />
    <!---->
</head>

<body>
    <script src="./assets/jquery/jquery-4.0.0.js"></script>
    <!--section hero-bg-->
    <section class="hero-bg">
        <div class="container-page">
            <div class="modal-form">
                <form class="form-login">
                    <div class="close-btn">
                        <img src="./assets/img/close.png" alt="close"/>
                    </div>
                    <div class="title-form">
                        <h2>Criar conta</h2>
                        <p>Preencha os dados abaixo para se cadastrar</p>
                    </div>
                    <div class="moviment-form">
                        <div class="input-text">
                            <span>Nome completo</span>
                            <input type="text" name="nome" placeholder="EX:JOÃO SILVA">
                        </div>
                        <div class="input-text">
                            <span>Email</span>
                            <input type="text" name="email" placeholder="EX:VOCE@EXEMPLO.COM">
                        </div>
                        <div class="input-text">
                            <span>Senha</span>
                            <input type="text" name="senha" placeholder="Ex:JOAO1230">
                        </div>
                        <div class="input-submit">
                            <input type="submit" name="acao" value="Cadastrar" />
                        </div>
                    </div>
                </form>
            </div>
            <div class="wrapper-center">
                <div class="compart-details">
                    <div class="icon-Sparkles">
                        <img src="./assets/img/clean.png" alt="clean" />
                    </div>
                    <h3>Novidade · Lançamento exclusivo</h3>
                </div>
                <div class="title-hero">
                    <h1>Comece sua <span>jornada</span> agora</h1>
                    <p>Junte-se a milhares de pessoas que já transformaram suas ideias em realidade. Cadastre-se em
                        segundos.</p>
                </div>
                <div class="dimension-fil">
                    <div class="button-one">
                        <a class="btn" href="#">Começar agora <i class="bi bi-arrow-right"></i></a>
                    </div>
                    <div class="text-fil">
                        <p>Grátis · Sem cartão de crédito</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!---->
</body>
<!--script js-->
<script src="./assets/js/modal.js"></script>

</html>
